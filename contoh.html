<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Pendaftaran Siswa</title>
    <style>
        body {
            background-image: url('background.jpg'); 
            background-size: cover; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-position: center;  
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        form, .map-container {
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
        }
        h2, h3 {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 10px;
        }
        .map-container h3 {
            color: #333;
            text-shadow: none;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-kampus {
            width: 100px;
            height: auto;
        }
        .img-map {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <h2>Form Pendaftaran Mahasiswa</h2>

    <div class="logo-container">
        <img src="logo stikom.png" alt="Logo STIKOM PGRI Banyuwangi" class="logo-kampus">
    </div>

    <form action="/proses_pendaftaran.js" method="post" enctype="multipart/form-data">
        <fieldset>
            <legend>Data Pribadi</legend>
            <p>
                <label for="nama">Nama Lengkap:</label><br>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
            </p>
            <p>
                <label for="email">Email Aktif:</label><br>
                <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
            </p>
            <p>
                <label for="hp">Nomer Hp Aktif:</label><br>
                <input type="tel" id="hp" name="hp" placeholder="08xxxxxxxxxx" required>
            </p>
            <p>
                <label for="tgl_lahir">Tanggal Lahir:</label><br>
                <input type="date" id="tgl_lahir" name="tgl_lahir" required>
            </p>
            <p>
                <label>Jenis Kelamin:</label><br>
                <input type="radio" id="pria" name="gender" value="Pria">
                <label for="pria">Pria</label>
                <input type="radio" id="wanita" name="gender" value="Wanita">
                <label for="wanita">Wanita</label>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>Data Akademik</legend>
            <p>
                <label for="prodi">Program Studi:</label><br>
                <select id="prodi" name="prodi">
                    <option value="">-- Pilih Jurusan --</option>
                    <option value="S1 TI">S1 Teknik Informatika</option>
                    <option value="D3 MI">D3 Manajemen Informatika</option>
                    <option value="S1 DKV">S1 Desain Komunikasi Visual</option>
                </select>
            </p>
            <p>
                <label>Asal Sekolah:</label><br>
                <input type="checkbox" id="sma" name="sekolah" value="SMA">
                <label for="sma">SMA</label>
                <input type="checkbox" id="smk" name="sekolah" value="SMK">
                <label for="smk">SMK</label>
                <input type="checkbox" id="ma" name="sekolah" value="MA">
                <label for="ma">MA</label>
            </p>
            <p>
                <label for="foto">Upload Foto:</label><br>
                <input type="file" id="foto" name="foto" accept="image/*">
            </p>
            <p>
                <label for="catatan">Catatan Tambahan:</label><br>
                <textarea id="catatan" name="catatan" rows="4" cols="40" placeholder="Tulis catatan tambahan..."></textarea>
            </p>
        </fieldset>

        <br>

        <div style="text-align: center;">
            <input type="submit" value="Daftar Sekarang">
            <input type="reset" value="Reset Form">
        </div>
    </form>

    <div class="map-container">
        <h3>Lokasi Kampus (Klik Area Peta)</h3>
        <img src="peta-kampus.jpg" alt="Peta Kampus STIKOM" usemap="#campusmap" class="img-map" width="400" height="300">

        <map name="campusmap">
            <area shape="rect" coords="34,44,270,190" href="info-gedung-a.html" alt="Gedung A" title="Klik untuk info Gedung A">
            
            <area shape="circle" coords="300,200,40" href="info-kantin.html" alt="Kantin" title="Area Kantin">
            
            <area shape="poly" coords="100,250,150,280,200,250" href="info-taman.html" alt="Taman" title="Taman Kampus">
        </map>
        <p style="font-size: 12px; text-align: center;">*Arahkan kursor dan klik pada bagian peta untuk informasi lebih lanjut[cite: 82].</p>
    </div>

</body>
</html>

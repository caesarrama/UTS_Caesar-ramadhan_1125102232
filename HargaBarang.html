<!DOCTYPE html>
<html>
<head>
    <title>Tugas 2 - Daftar Harga Produk</title>
    <style>
        .table-wrapper {overflow-x: auto;}
        table {
            width: 100%;
            border-collapse: collapse;
        }
        caption {
            font-weight: bold;
            font-size: 20px;
            padding: 10px;
        }
        th {
            background-color: #04aa6d; 
            color: white;
            padding: 12px;
            border: 1px solid #ddd;
        }
        td {
            padding: 12px;
            border: 1px solid #ddd;
        }
        .promo {
            background-color: #fff9c4; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <caption>Daftar Harga Produk</caption>
    <thead>
        <tr>
            <th>Kategori</th>
            <th>Produk</th>
            <th>Harga</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td rowspan="4">Elektronik</td>
            <td>Laptop</td>
            <td>Rp 8.000.000</td>
        </tr>
        <tr>
            <td>Smartphone</td>
            <td>Rp 4.000.000</td>
        </tr>
        <tr>
            <td>Keyboard</td>
            <td>Rp 100.000</td>
        </tr>
        <tr>
            <td>Mouse</td>
            <td>Rp 50.000</td>
        </tr>
        <tr class="promo">
            <td colspan="2">Paket Bundling (Laptop + Mouse)</td>
            <td>Rp 8.200.000</td>
        </tr>
        <tr class="promo">
            <td colspan="2">Paket Bundling (PC + Monitor)</td>
            <td>Rp 10.000.000</td>
        </tr>
    </tbody>
</table>


</body>
</html>

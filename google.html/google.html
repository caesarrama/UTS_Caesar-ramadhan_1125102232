<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Simple - Caesar</title>
    <style>
        .header {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            padding: 10px 20px;
            align-items: center;
        }
        .ul {
            display: flex;
            flex-direction: row;
            gap: 20px;
            list-style: none;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 100px;
        }
        .search-container {
            display: flex;
            align-items: center;
            width: 80%;
            max-width: 500px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 10px 18px;
            margin-top: 20px;
            box-sizing: border-box;
        }
        .search-box {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 12px;
        }
        .search-icon {
            width: 18px;
            height: 18px;
            display: block;
        }
        .shortcut-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .shortcut-button {
            width: 45px;
            height: 45px;
            background-color: #f1f3f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #5f6368;
        }
        .shortcut-text {
            font-size: 12px;
            color: #3c4043;
            margin-top: 8px;
            font-family: Arial, sans-serif;
        }
        .profile-icon {
            width: 32px;
            height: 32px;
            background-color: grey;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <ul class="ul">
                <li>Gmail</li>
                <li>Image</li>
                <li>Bar</li>
                <li>
                    <div class="profile-icon">C</div>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" 
             alt="Google PNG" width="200">

        <form action="Position/magnifying-glass.png" method="get" style="width: 100%; display: flex; justify-content: center;">
            <div class="search-container">
                <img src="magnifying-glass.png" alt="Search" class="search-icon">
                
                <input type="text" name="q" class="search-box" placeholder="Search Googlev or type a URL">
                
                <img src="mic.png" alt="Mic" class="search-icon" style="margin-right: 12px;">
                <img src="photo-camera.png" alt="Camera" class="search-icon">
            </div>
        </form>

        <div class="shortcut-container">
            <div class="shortcut-button">+</div>
            <div class="shortcut-text">Add shortcut</div>
        </div>
    </main>
</body>
</html>

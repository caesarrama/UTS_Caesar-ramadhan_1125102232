<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Pendaftaran Mahasiswa STIKOM</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        img { display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo stikom.png" 
             alt="Logo STIKOM" 
             style="width: 150px; height: auto;" 
             title="Klik bagian logo untuk ke website kami"

        <h2>Form Pendaftaran Siswa</h2>
    </div>

    <form action="/proses_pendaftaran.js" method="post" enctype="multipart/form-data">
        
        <fieldset>
            <legend>Data Pribadi</legend>
            <p>
                <label for="nama">Nama Lengkap:</label><br>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
            </p>
            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
            </p>
            <p>
                <label for="hp">Nomor HP:</label><br>
                <input type="tel" id="hp" name="hp" placeholder="08xxxxxxxxxx" required>
            </p>
            <p>
                <label for="tgl_lahir">Tanggal Lahir:</label><br>
                <input type="date" id="tgl_lahir" name="tgl_lahir" required>
            </p>
            <p>
                <label>Jenis Kelamin:</label><br>
                <input type="radio" id="pria" name="gender" value="Pria">
                <label for="pria">Pria</label>
                <input type="radio" id="wanita" name="gender" value="Wanita">
                <label for="wanita">Wanita</label>
            </p>

            <p>
                <label for="foto">Unggah Foto Siswa:</label><br>
                <input type="file" id="foto" name="foto" accept="image/*" required>
            </p>
        </fieldset>

        <p>
            <button type="submit">Daftar Sekarang</button>
        </p>
    </form>
    
</body>
</html>

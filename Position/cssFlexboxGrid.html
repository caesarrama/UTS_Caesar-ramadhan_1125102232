<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cssFlexboxGrid</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
        }
        .flex-container {
            display: flex;
            gap: 20px;
            text-align: center;
        }
        .flex-item {
            width: 100px;
            height: 200px;
            background: pink;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 100px 150px 100px;
            grid-template-rows: 100px 100px 100px;
            gap: 20px;
        }
        .red {
            background: red;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .blue {
            background: blue;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .purple {
            background: purple;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .item1{
            grid-column: 1/2;
        }
        .item2 {
            grid-column: 2/4;
        }
        .item3 {
            grid-column: 1/3;
        }
        .item4 {
            grid-column: 3/4;
            grid-row: 2/4;
        }
        .item5 {
            grid-column: 1/2;
        }
        .item6 {
            grid-column: 2/3;
        }
    </style>
</head>
<body>
    <h1>Perbandingan CSS Flexbox dengan CSS Grid</h1>
    <div class="container">
        <section class="flex-section">
            <h2> CSS Flexbox</h2>
            <div class="flex-container">
                <div class="flex-item">1</div>
                <div class="flex-item">2</div>
                <div class="flex-item">3</div>
            </div>
        </section>
        <section class="grid-section">
            <h2>CSS Grid</h2>
            <div class="grid-container">
                <div class="box red item1">RED</div>
                <div class="box purple item2">PURPLE</div>
                <div class="box purple item3">PURPLE</div>
                <div class="box blue item4">BLUE</div>
                <div class="box red item5">RED</div>
                <div class="box red item6">RED</div>
    </div>
</body>
</html>
